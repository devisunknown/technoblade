<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Admin Login | Akwaaba Market</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-surface": "#191c1b",
                    "surface-tint": "#2b6954",
                    "on-secondary-container": "#684000",
                    "background": "#f8faf6",
                    "secondary-fixed": "#ffddb8",
                    "on-surface-variant": "#404944",
                    "outline": "#707974",
                    "surface-container-highest": "#e1e3e0",
                    "tertiary-container": "#6a3700",
                    "primary-fixed": "#b0f0d6",
                    "on-primary-fixed-variant": "#0b513d",
                    "surface-container-low": "#f2f4f1",
                    "surface-container-lowest": "#ffffff",
                    "on-primary-fixed": "#002117",
                    "on-error": "#ffffff",
                    "on-secondary-fixed": "#2a1700",
                    "on-error-container": "#93000a",
                    "on-tertiary-fixed-variant": "#6e3900",
                    "surface-bright": "#f8faf6",
                    "primary-fixed-dim": "#95d3ba",
                    "error-container": "#ffdad6",
                    "surface-dim": "#d8dbd7",
                    "on-tertiary-fixed": "#2f1500",
                    "on-background": "#191c1b",
                    "inverse-primary": "#95d3ba",
                    "error": "#ba1a1a",
                    "on-tertiary": "#ffffff",
                    "tertiary-fixed": "#ffdcc3",
                    "surface-container": "#eceeeb",
                    "secondary-fixed-dim": "#ffb95f",
                    "outline-variant": "#bfc9c3",
                    "surface-container-high": "#e7e9e5",
                    "primary": "#003527",
                    "primary-container": "#064e3b",
                    "on-secondary": "#ffffff",
                    "secondary-container": "#fea619",
                    "surface-variant": "#e1e3e0",
                    "secondary": "#855300",
                    "inverse-on-surface": "#eff1ee",
                    "tertiary": "#4a2400",
                    "tertiary-fixed-dim": "#ffb77d",
                    "on-secondary-fixed-variant": "#653e00",
                    "on-tertiary-container": "#ff9939",
                    "on-primary": "#ffffff",
                    "inverse-surface": "#2e312f",
                    "surface": "#f8faf6",
                    "on-primary-container": "#80bea6"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "container-margin-desktop": "auto",
                    "xs": "4px",
                    "lg": "24px",
                    "base": "8px",
                    "sm": "8px",
                    "md": "16px",
                    "container-margin-mobile": "16px",
                    "gutter": "16px",
                    "xl": "32px"
            },
            "fontFamily": {
                    "title-md": ["Inter"],
                    "label-md": ["Inter"],
                    "headline-lg-mobile": ["Inter"],
                    "display-lg": ["Inter"],
                    "body-lg": ["Inter"],
                    "price-lg": ["Inter"],
                    "headline-lg": ["Inter"],
                    "body-sm": ["Inter"]
            },
            "fontSize": {
                    "title-md": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                    "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                    "display-lg": ["36px", {"lineHeight": "44px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "price-lg": ["20px", {"lineHeight": "28px", "fontWeight": "700"}],
                    "headline-lg": ["28px", {"lineHeight": "36px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom subtle texture for background */
        .bg-subtle-pattern {
            background-color: #f8faf6;
            background-image: radial-gradient(#003527 0.5px, transparent 0.5px);
            background-size: 24px 24px;
            background-opacity: 0.05;
        }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen flex flex-col">
<!-- TopNavBar (Shared Component) -->
<!-- Suppression Logic: Login pages usually hide nav, but the prompt explicitly requested TopNavBar and Footer -->
<header class="fixed top-0 left-0 w-full z-50 bg-surface dark:bg-on-surface shadow-sm h-16 flex justify-between items-center px-container-margin-mobile md:px-xl">
<div class="flex items-center gap-md">
<span class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-primary dark:text-primary-fixed-dim">DABSTELL 15 ENTERPRISE
</span>
</div>
<div class="flex items-center gap-md">
<button class="text-on-surface-variant dark:text-outline-variant hover:opacity-80 transition-opacity active:scale-95 flex items-center">
<span class="material-symbols-outlined" data-icon="help">help</span>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center px-container-margin-mobile pt-20 pb-12 bg-subtle-pattern">
<!-- Login Card -->
<div class="w-full max-w-[440px] bg-surface-container-lowest rounded-xl shadow-[0px_4px_12px_rgba(0,0,0,0.04)] p-xl md:p-12 border border-outline-variant/30 flex flex-col items-center">
<!-- Logo & Header -->
<div class="mb-xl text-center">
<div class="w-16 h-16 bg-primary/10 rounded-full flex items-center justify-center mb-md mx-auto">
<span class="material-symbols-outlined text-primary text-[32px]" style="font-variation-settings: 'FILL' 1;">storefront</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-primary mb-xs">Admin Portal</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant">Please sign in to manage your shop</p>
</div>

<form class="w-full space-y-md" id="loginForm" action="{% url 'adminlog' %}">

<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="email">Admin Email</label>
<div class="relative group">
<span class="absolute left-md top-1/2 -translate-y-1/2 material-symbols-outlined text-outline group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full h-12 pl-[48px] pr-md bg-surface-container-low border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all font-body-lg text-body-lg outline-none" id="username" placeholder="DABSTEL_ENTERPRISE_ADMIN" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">Password</label>
<div class="relative group">
<span class="absolute left-md top-1/2 -translate-y-1/2 material-symbols-outlined text-outline group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full h-12 pl-[48px] pr-[48px] bg-surface-container-low border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all font-body-lg text-body-lg outline-none" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-md top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" id="passwordIcon">visibility</span>
</button>
</div>
</div>
<!-- Actions Area -->
<div class="flex items-center justify-between py-xs">
<label class="flex items-center gap-sm cursor-pointer group">
<div class="relative flex items-center">
<input class="peer hidden" type="checkbox"/>
<div class="w-5 h-5 border-2 border-outline-variant rounded peer-checked:bg-primary peer-checked:border-primary transition-all flex items-center justify-center">
<span class="material-symbols-outlined text-white text-[16px] hidden peer-checked:block">check</span>
</div>
</div>
<span class="font-body-sm text-body-sm text-on-surface-variant group-hover:text-primary transition-colors">Remember me</span>
</label>
<a class="font-body-sm text-body-sm text-secondary font-semibold hover:underline" href="#">Forgot password?</a>
</div>
<!-- Submit Button -->
<button class="w-full h-12 bg-primary text-on-primary font-title-md text-title-md rounded-lg shadow-sm hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-sm" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined text-[20px]">login</span>
</button>
</form>
<!-- Security Badge -->
<div class="mt-xl flex items-center gap-xs text-outline text-[12px] font-label-md uppercase tracking-widest opacity-60">
<span class="material-symbols-outlined text-[16px]">verified_user</span>
<span>Secure Admin Access</span>
</div>
</div>
</main>
<!-- Footer (Shared Component) -->
<footer class="w-full py-xl px-container-margin-mobile md:px-xl flex flex-col md:flex-row justify-between items-center gap-md bg-surface-container-low dark:bg-on-surface">
<div class="flex flex-col items-center md:items-start gap-xs">
<span class="font-title-md text-title-md text-primary">DABSTELL 15 ENTERPRISE</span>
<span class="font-body-sm text-body-sm text-on-surface-variant dark:text-outline-variant">© 2026 SCANCOAT SYSTEMS NK;. All rights reserved.</span>
</div>
<nav class="flex gap-lg">
<a class="font-body-sm text-body-sm text-on-surface-variant dark:text-outline-variant hover:text-primary dark:hover:text-primary-fixed transition-colors" href="#">Privacy Policy</a>
<a class="font-body-sm text-body-sm text-on-surface-variant dark:text-outline-variant hover:text-primary dark:hover:text-primary-fixed transition-colors" href="#">Terms of Service</a>
<a class="font-body-sm text-body-sm text-on-surface-variant dark:text-outline-variant hover:text-primary dark:hover:text-primary-fixed transition-colors" href="#">Contact Support</a>
</nav>
</footer>
<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const passwordIcon = document.getElementById('passwordIcon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                passwordIcon.innerText = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                passwordIcon.innerText = 'visibility';
            }
        }

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            
            // Interaction feedback
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span>';
            btn.disabled = true;
            
            setTimeout(() => {
                alert('Login attempt simulated. In a real environment, this would hit the API.');
                btn.innerHTML = originalContent;
                btn.disabled = false;
            }, 1500);
        });
    </script>
</body></html>
